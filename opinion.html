<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imagenes/descargar (2).png" type="image/x-icon">
    <title>Cuestionario R6</title>
    <script src="app.js" defer></script>
</head>
<body>

    <header>
        <h1>Rainbow Six Siege: Encuesta</h1>
        <nav>
            <ul>
                <li><a href="index.html">← Volver al inicio</a></li>
            </ul>
        </nav>
    
    <button id="btn-tema" aria-label="Cambiar tema">
        <span class="icono-tema">🌙</span>
        <span class="label-tema">Oscuro</span>
    </button>
    </header>

    <main>
        <section class="form-section">
            <h2>Contanos tu experiencia</h2>
            <p>Completá el formulario y dejanos saber qué pensás del juego.</p>

            <form action="">

                <fieldset>
                    <legend>Datos Personales</legend>

                    <div class="campo">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" placeholder="Ingrese su nombre">
                        <span class="error-msg" id="error-nombre"></span>
                    </div>

                    <div class="campo">
                        <label for="nametag">NameTag:</label>
                        <input type="text" id="nametag" placeholder="Nombre dentro del juego">
                        <span class="error-msg" id="error-nametag"></span>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Preferencias de juego</legend>

                    <div class="campo">
                        <label for="bando">Bando favorito:</label>
                        <select name="bando" id="bando">
                            <option value="1">Atacante</option>
                            <option value="2">Defensor</option>
                            <option value="3">Me da igual</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label>¿Soles jugar partidas competitivas?</label>
                        <div class="radio-grupo">
                            <label class="radio-opcion">
                                <input type="radio" name="compe" value="si">
                                Sí, me gusta competir
                            </label>
                            <label class="radio-opcion">
                                <input type="radio" name="compe" value="no">
                                No, prefiero jugar casual
                            </label>
                        </div>
                        <span class="error-msg" id="error-compe"></span>
                    </div>

                    <div class="campo">
                        <label>Si jugás competitivas, ¿qué rango sos?</label>
                        <div class="radio-grupo radio-grupo--rangos">
                            <label class="radio-opcion"><input type="radio" name="rango" value="cobre"> Cobre</label>
                            <label class="radio-opcion"><input type="radio" name="rango" value="bronce"> Bronce</label>
                            <label class="radio-opcion"><input type="radio" name="rango" value="plata"> Plata</label>
                            <label class="radio-opcion"><input type="radio" name="rango" value="oro"> Oro</label>
                            <label class="radio-opcion"><input type="radio" name="rango" value="platino"> Platino</label>
                            <label class="radio-opcion"><input type="radio" name="rango" value="diamante"> Diamante</label>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Tu experiencia</legend>
                    <div class="campo">
                        <label for="comentario">Dejá un comentario sobre tu experiencia jugando:</label>
                        <textarea id="comentario" rows="5" maxlength="200"
                            placeholder="Dejá tu comentario :)"></textarea>
                    </div>
                </fieldset>

                <div id="exito-msg" class="exito-msg"></div>

                <div class="form-botones">
                    <input type="submit" value="Enviar" class="btn btn-enviar">
                    <input type="reset"  value="Borrar"  class="btn btn-borrar">
                </div>

            </form>
        </section>
    </main>

    <footer>
        <p>Rainbow Six Siege — Manual de Armas</p>
    </footer>

</body>
</html>
